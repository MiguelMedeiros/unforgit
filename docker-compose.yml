services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hippocampus
      POSTGRES_PASSWORD: hippocampus
      POSTGRES_DB: hippocampus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hippocampus"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3737:3737"
    environment:
      DATABASE_URL: postgresql://hippocampus:hippocampus@postgres:5432/hippocampus
      PORT: "3737"
      HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
