services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unforgit
      POSTGRES_PASSWORD: unforgit
      POSTGRES_DB: unforgit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unforgit"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3737:3737"
    environment:
      DATABASE_URL: postgresql://unforgit:unforgit@postgres:5432/unforgit
      PORT: "3737"
      HOST: "0.0.0.0"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-me}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3939:3939"
    environment:
      API_URL: http://api:3737
    depends_on:
      - api
    restart: unless-stopped

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    ports:
      - "3030:3000"
    restart: unless-stopped

volumes:
  postgres_data:
