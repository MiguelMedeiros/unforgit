name: Publish npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-packages:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://unforgit:***@localhost:5432/unforgit

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://unforgit:***@localhost:5432/unforgit

      - name: CLI smoke test
        run: pnpm smoke:cli

      - name: Publish CLI to npm
        run: |
          set -euo pipefail
          name=$(node -p "require('./apps/cli/package.json').name")
          version=$(node -p "require('./apps/cli/package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} is already published; skipping."
          else
            (cd apps/cli && pnpm publish --access public --provenance --no-git-checks)
          fi

      - name: Verify npm install includes CLI and MCP binaries
        run: |
          set -euo pipefail
          version=$(node -p "require('./apps/cli/package.json').version")
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          for attempt in $(seq 1 12); do
            if npm view "unforgit@${version}" version >/dev/null 2>&1 && npm install --prefer-online "unforgit@${version}"; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "unforgit@${version} was not installable after ${attempt} attempts" >&2
              exit 1
            fi
            echo "unforgit@${version} not visible/installable from npm yet; retrying in 20s..."
            sleep 20
          done
          test -x node_modules/.bin/unforgit
          test -x node_modules/.bin/unforgit-mcp
          node_modules/.bin/unforgit --version | grep -Fx "$version"
          timeout 2s node_modules/.bin/unforgit-mcp >/tmp/unforgit-mcp.stdout 2>/tmp/unforgit-mcp.stderr || true
          test ! -s /tmp/unforgit-mcp.stdout
