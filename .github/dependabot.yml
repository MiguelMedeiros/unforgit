version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    # Version updates are batched manually by maintainers to keep release
    # risk reviewable. GitHub security alerts remain handled separately.
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: America/Sao_Paulo
    # Version updates are batched manually by maintainers to keep release
    # risk reviewable. GitHub security alerts remain handled separately.
    open-pull-requests-limit: 0
